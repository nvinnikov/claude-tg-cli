# Скопируй в config.toml и заполни. config.toml в git не попадает.
bot_token = "123456:REPLACE_ME"

# Твой Telegram user_id (@userinfobot). Только он может управлять ботом.
allowed_user_id = 0

# id супергруппы с включёнными topics.
chat_id = 0

# Рабочий каталог по умолчанию для новых сессий. Поддерживается ~.
default_cwd = "~"

# Сколько секунд ждать нажатия кнопки подтверждения, прежде чем отказать.
approval_timeout_s = 300

# Путь к БД сессий. Относительный — резолвится рядом с config.toml.
db_path = "sessions.db"
