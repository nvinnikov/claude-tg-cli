# Команды, разрешённые без подтверждения. Матчинг — re.search по всей строке команды.
allow = [
  "^git (status|log|diff|show|branch|remote|stash list)\\b",
  "^kubectl (get|describe|logs|top)\\b",
  "^(ls|pwd|cat|head|tail|wc|file|stat|which|env)\\b",
  "^rg\\b",
  "^docker (ps|logs|images)\\b",
  "^make (test|lint|build)\\b",
  "^go (test|vet|build|list)\\b",
  "^npm run (test|lint|build)\\b",
]

# Запрещено всегда. Проверяется первым, кнопкой не обходится.
deny = [
  "\\brm\\b.*(-[a-zA-Z]*[rRfF]|--recursive|--force|--no-preserve-root)",
  "\\bdd\\s+if=",
  ":\\(\\)\\s*\\{",
  "\\bmkfs\\b",
  "--context[=\\s]+prod",
  "\\bgit\\s+push\\b.*(--force|-f\\b)",
  "\\bshutdown\\b|\\breboot\\b",
]
